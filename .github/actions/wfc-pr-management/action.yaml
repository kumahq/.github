name: PR management composite
description: Approve and merge Kuma-related PRs
inputs:
  matchLabel:
    description: "A set of labels to match PR against"
    required: false
  approve:
    description: "Whether the PR should be auto approved"
    required: false
    default: 'false'
  merge:
    description: "Whether the PR should be auto merged"
    required: false
    default: 'false'
  comment:
    description: "Whether we should comment the actions we do"
    required: false
    default: 'false'
  github-token:
    description: 'GitHub Token'
    required: true
  github-token-approve:
    description: 'GitHub Token to approve (if missing github-token is used for everything)'
    required: false
runs:
  using: composite
  steps:
    - name: approve
      if: >
        inputs.approve == 'true' 
        && github.event.pull_request 
        && (
          inputs.matchLabel == '' 
          || contains(github.event.pull_request.labels.*.name, inputs.matchLabel)
        )
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token-approve || inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GH_REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
      run: |
        # Approve
        gh pr review "$PR_NUMBER" -a -R "$GH_REPOSITORY" \
          -b "Auto approved by PR [action](https://github.com/$GH_REPOSITORY/actions/runs/$RUN_ID)"
    - name: merge
      if: >
        inputs.merge == 'true'
        && github.event.pull_request
        && (
          inputs.matchLabel == ''
          || contains(github.event.pull_request.labels.*.name, inputs.matchLabel)
        )
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GH_REPOSITORY: ${{ github.repository }}
      run: |
        # Merge
        gh pr merge "$PR_NUMBER" --auto --squash -R "$GH_REPOSITORY"
    - name: comment
      if: >
        inputs.merge == 'true'
        && github.event.pull_request
        && (
          inputs.matchLabel == ''
          || contains(github.event.pull_request.labels.*.name, inputs.matchLabel)
        )
      uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
      with:
        message: ${{ inputs.comment }}
